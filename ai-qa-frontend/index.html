<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Document Q&A</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; }
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; flex-shrink: 0; background: #f9fafb; border-right: 1px solid #e5e7eb;
    display: flex; flex-direction: column; padding: 16px 12px; height: 100vh; overflow-y: auto; }
  .brand { font-size: 15px; font-weight: 600; color: #2563eb; padding: 4px 8px 16px; }
  .upload-label { display: flex; align-items: center; justify-content: center; padding: 8px 10px;
    border-radius: 8px; background: #2563eb; color: white; cursor: pointer; font-size: 13px;
    font-weight: 500; margin-bottom: 8px; }
  .upload-label.disabled { background: #9ca3af; cursor: not-allowed; }
  .files-heading { font-size: 11px; color: #9ca3af; padding: 8px 10px 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .file-item { width: 100%; text-align: left; padding: 8px 10px; border-radius: 8px; border: none;
    background: transparent; cursor: pointer; color: #374151; margin-bottom: 2px; }
  .file-item.active { background: #eff6ff; color: #2563eb; font-weight: 500; }
  .file-item .title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-item .meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .empty-note { font-size: 12px; color: #9ca3af; padding: 0 10px; }

  /* Main column */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Topbar */
  .topbar { height: 52px; background: white; border-bottom: 1px solid #e5e7eb; display: flex;
    align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
  .topbar .filename { flex: 1; font-size: 14px; font-weight: 500; color: #111827; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .topbar .status { font-size: 12px; color: #6b7280; flex-shrink: 0; }
  .topbar .status.error { color: #dc2626; }
  .btn-outline { padding: 6px 12px; background: white; border: 1px solid #d1d5db; border-radius: 7px;
    cursor: pointer; font-size: 12px; color: #374151; flex-shrink: 0; }
  .btn-outline:disabled { cursor: not-allowed; opacity: 0.6; }
  .btn-green { padding: 6px 12px; background: #16a34a; color: white; border: none; border-radius: 7px;
    cursor: pointer; font-size: 12px; flex-shrink: 0; }
  .btn-green:disabled { background: #9ca3af; cursor: not-allowed; }

  /* Content row */
  .content { flex: 1; display: flex; overflow: hidden; }

  /* Chat */
  .chat-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .messages .empty { color: #9ca3af; text-align: center; margin-top: 60px; font-size: 14px; }
  .msg-row { display: flex; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.ai, .msg-row.system { justify-content: flex-start; }
  .bubble { display: inline-block; padding: 9px 13px; border-radius: 12px; max-width: 80%;
    font-size: 13px; line-height: 1.6; }
  .bubble.user { background: #2563eb; color: white; }
  .bubble.ai { background: #f3f4f6; color: #111827; }
  .bubble.system { background: #fef3c7; color: #92400e; }
  .thinking { color: #9ca3af; font-size: 13px; font-style: italic; }
  .input-row { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 13px; outline: none; }
  .btn-send { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 8px;
    cursor: pointer; font-weight: 500; font-size: 13px; }
  .btn-send:disabled { background: #9ca3af; cursor: not-allowed; }

  /* Timestamp row */
  .timestamp-note { padding: 12px 16px; border-top: 1px solid #e5e7eb; font-size: 13px; color: #6b7280; }
  .timestamp-note .heading { font-weight: 500; color: #374151; margin-bottom: 4px; }
  .timestamp-note .hint { font-style: italic; font-size: 12px; }

  /* Summary panel */
  .summary-col { width: 280px; flex-shrink: 0; border-left: 1px solid #e5e7eb; padding: 16px;
    overflow-y: auto; background: #fafafa; }
  .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .summary-header span { font-weight: 500; font-size: 13px; color: #374151; }
  .summary-text { white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: #111827; }
  .summary-empty { color: #6b7280; font-size: 13px; }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand">AI Doc Q&A</div>

    <input type="file" id="file-upload" accept=".pdf,.mp3,.mp4,.wav,.m4a,.ogg" style="display:none" />
    <label for="file-upload" id="upload-label" class="upload-label">Upload File</label>

    <div class="files-heading">Your Files</div>
    <div id="file-list"></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="filename" id="topbar-filename">AI Document Q&A</div>
      <span class="status" id="status-text"></span>
      <button class="btn-outline" id="refresh-btn">Refresh</button>
      <button class="btn-green" id="summarize-btn" disabled>Summary</button>
    </header>

    <div class="content">
      <div class="chat-col">
        <div class="messages" id="messages">
          <p class="empty">Ask anything about your document...</p>
        </div>
        <div class="input-row">
          <input type="text" id="question-input" placeholder="Select a file first" disabled />
          <button class="btn-send" id="send-btn" disabled>Send</button>
        </div>
        <div class="timestamp-note" id="timestamp-note" style="display:none">
          <div class="heading">Timestamps</div>
          <div class="hint">Ask a question about your audio/video — timestamps will appear in chat above.</div>
        </div>
      </div>

      <div class="summary-col">
        <div class="summary-header">
          <span>Summary</span>
          <button class="btn-green" id="summary-generate-btn" disabled>Generate</button>
        </div>
        <div id="summary-content" class="summary-empty">Select a file and click Generate.</div>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://gsuhani17-ai-qa-backend.hf.space/api';

let files = [];
let selectedFile = null;
let messages = [];
let loading = false;
let uploading = false;

const fileUploadInput = document.getElementById('file-upload');
const uploadLabel = document.getElementById('upload-label');
const fileListEl = document.getElementById('file-list');
const topbarFilename = document.getElementById('topbar-filename');
const statusText = document.getElementById('status-text');
const refreshBtn = document.getElementById('refresh-btn');
const summarizeBtn = document.getElementById('summarize-btn');
const messagesEl = document.getElementById('messages');
const questionInput = document.getElementById('question-input');
const sendBtn = document.getElementById('send-btn');
const timestampNote = document.getElementById('timestamp-note');
const summaryGenerateBtn = document.getElementById('summary-generate-btn');
const summaryContentEl = document.getElementById('summary-content');

function setStatus(text, isError) {
  statusText.textContent = text;
  statusText.className = 'status' + (isError ? ' error' : '');
}

function renderFileList() {
  fileListEl.innerHTML = '';
  if (files.length === 0) {
    fileListEl.innerHTML = '<p class="empty-note">No files yet</p>';
    return;
  }
  files.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'file-item' + (selectedFile === f.id ? ' active' : '');
    btn.innerHTML = `
      <div class="title">${f.title}</div>
      <div class="meta">${f.file_type} &middot; ${new Date(f.created_at).toLocaleDateString()} &middot; ${f.is_processed ? 'Ready' : 'Processing'}</div>
    `;
    btn.onclick = () => selectFile(f.id);
    fileListEl.appendChild(btn);
  });
}

function renderMessages() {
  if (messages.length === 0) {
    messagesEl.innerHTML = '<p class="empty">Ask anything about your document...</p>';
    return;
  }
  messagesEl.innerHTML = '';
  messages.forEach(m => {
    const row = document.createElement('div');
    row.className = 'msg-row ' + m.role;
    const bubble = document.createElement('span');
    bubble.className = 'bubble ' + m.role;
    bubble.textContent = m.content;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
  });
  if (loading) {
    const p = document.createElement('p');
    p.className = 'thinking';
    p.textContent = 'AI is thinking...';
    messagesEl.appendChild(p);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateControls() {
  const canAct = !!selectedFile && !loading && !uploading;
  summarizeBtn.disabled = !canAct;
  summaryGenerateBtn.disabled = !canAct;
  questionInput.disabled = !canAct;
  questionInput.placeholder = selectedFile ? 'Ask about the document...' : 'Select a file first';
  sendBtn.disabled = !canAct || !questionInput.value.trim();
  refreshBtn.disabled = loading || uploading;

  uploadLabel.textContent = uploading ? 'Processing...' : 'Upload File';
  uploadLabel.className = 'upload-label' + (uploading ? ' disabled' : '');

  const file = files.find(f => f.id === selectedFile);
  topbarFilename.textContent = file ? file.title : 'AI Document Q&A';

  timestampNote.style.display = (selectedFile && file && file.file_type !== 'pdf') ? 'block' : 'none';
}

async function fetchFiles() {
  try {
    setStatus('Loading...', false);
    const res = await fetch(`${API_URL}/files/`);
    if (!res.ok) throw new Error('Connection failed');
    files = await res.json();
    setStatus(`${files.length} file(s) loaded`, false);
    renderFileList();
    updateControls();
  } catch (err) {
    setStatus(err.message || 'Connection failed', true);
  }
}

async function handleRefresh() {
  await fetchFiles();
  if (selectedFile && !files.find(f => f.id === selectedFile)) {
    selectedFile = null;
    messages = [];
    summaryContentEl.textContent = 'Select a file and click Generate.';
    summaryContentEl.className = 'summary-empty';
    renderMessages();
    updateControls();
  }
}

async function handleUpload(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  uploading = true;
  updateControls();
  setStatus('Uploading...', false);

  const formData = new FormData();
  formData.append('title', file.name.replace(/\.[^/.]+$/, ''));
  formData.append('file', file);

  try {
    const res = await fetch(`${API_URL}/upload/`, { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    setStatus('Processed!', false);
    selectedFile = data.file_id;
    await fetchFiles();
    alert(`Success!\nFile: ${data.title || file.name}\nChunks: ${data.chunks}`);
  } catch (err) {
    setStatus(err.message || 'Upload failed', true);
    alert(`Upload failed:\n${err.message}`);
  } finally {
    uploading = false;
    fileUploadInput.value = '';
    updateControls();
  }
}

function selectFile(fileId) {
  selectedFile = fileId;
  messages = [];
  summaryContentEl.textContent = 'Select a file and click Generate.';
  summaryContentEl.className = 'summary-empty';
  const file = files.find(f => f.id === fileId);
  setStatus(`Selected: ${file ? file.title : 'File'}`, false);
  renderFileList();
  renderMessages();
  updateControls();
}

async function handleSend() {
  const question = questionInput.value.trim();
  if (!question || !selectedFile) return;
  messages.push({ role: 'user', content: question });
  questionInput.value = '';
  loading = true;
  renderMessages();
  updateControls();

  try {
    const res = await fetch(`${API_URL}/chat/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: selectedFile, question })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    messages.push({ role: 'ai', content: data.answer });

    if (data.referenced_timestamp != null) {
      const totalSec = Math.floor(data.referenced_timestamp);
      const mins = Math.floor(totalSec / 60);
      const secs = (totalSec % 60).toString().padStart(2, '0');
      messages.push({ role: 'system', content: `Jump to ${mins}:${secs} in production player` });
    }
  } catch (err) {
    messages.push({ role: 'ai', content: err.message || 'Request failed' });
  } finally {
    loading = false;
    renderMessages();
    updateControls();
  }
}

async function handleSummarize() {
  if (!selectedFile) return;
  loading = true;
  setStatus('Generating summary...', false);
  updateControls();

  try {
    const res = await fetch(`${API_URL}/summarize/${selectedFile}/`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Summary failed');
    summaryContentEl.textContent = data.summary;
    summaryContentEl.className = 'summary-text';
    setStatus('Summary ready!', false);
  } catch (err) {
    summaryContentEl.textContent = 'Summary generation failed. Please try again.';
    summaryContentEl.className = 'summary-empty';
    setStatus(err.message || 'Summary failed', true);
  } finally {
    loading = false;
    updateControls();
  }
}

fileUploadInput.addEventListener('change', handleUpload);
refreshBtn.addEventListener('click', handleRefresh);
summarizeBtn.addEventListener('click', handleSummarize);
summaryGenerateBtn.addEventListener('click', handleSummarize);
sendBtn.addEventListener('click', handleSend);
questionInput.addEventListener('input', updateControls);
questionInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });

fetchFiles();
</script>
</body>
</html>
